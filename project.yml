name: Scriber
options:
  bundleIdPrefix: com.scriber
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Scriber:
    type: application
    platform: macOS
    sources:
      - Scriber
    settings:
      base:
        INFOPLIST_FILE: Scriber/Info.plist
        CODE_SIGN_ENTITLEMENTS: Scriber/Scriber.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.scriber.app
        PRODUCT_NAME: Scriber
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_IDENTITY: "Apple Development: Abhishek kureriya (F4QG4FHLC9)"
        CODE_SIGN_STYLE: Manual
